site_name: "Project Sentinel"
site_description: "Deterministic pricing infrastructure for US GovCon and Civilian Infrastructure contractors."
site_author: "Invariant"
site_url: "https://sub2mval.github.io/project-sentinel/"

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  icon:
    logo: material/shield-lock-outline
  favicon: assets/favicon.ico

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: "https://linkedin.com/company/invariant"

plugins:
  - search
  - mermaid2:
      arguments:
        theme: dark

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Security & Trust: security_and_trust.md
  - Getting Started: getting_started.md

extra_css:
  - stylesheets/extra.css
